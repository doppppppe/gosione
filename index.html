// ========== Leaflet CDN 동적 로드 ==========
const loadLeaflet = () => {
  if (window.L) return Promise.resolve(window.L);
  return new Promise((resolve) => {
    if (!document.querySelector('link[href*="leaflet.min.css"]')) {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(css);
    }
    if (!document.querySelector('script[src*="leaflet.min.js"]')) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      script.onload = () => resolve(window.L);
      document.head.appendChild(script);
    } else {
      const check = setInterval(() => {
        if (window.L) { clearInterval(check); resolve(window.L); }
      }, 50);
    }
  });
};

const RAMP_M = ['#eaeaff','#cfcffa','#a8a8f0','#8484e2','#6868d1','#4f4fbb','#3a3aa0'];
const RAMP_O = ['#fef3ee','#fbd5c0','#f3a37e','#dd6a44','#a83d22','#7e2810','#4f1808'];
const colorFor = (v, ramp, mn, mx) => {
  if (v == null) return '#e4e4e7';
  const step = (mx - mn) / ramp.length;
  return ramp[Math.max(0, Math.min(ramp.length - 1, Math.floor((v - mn) / step)))];
};

// ========== 메인 인터랙티브 지도 ==========
const InteractiveMap = ({ layer = 'mini-points', side = 'mini' }) => {
  const containerRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const layersRef = React.useRef({});
  
  React.useEffect(() => {
    let cancelled = false;
    if (!containerRef.current) return;
    
    loadLeaflet().then(L => {
      if (cancelled || !containerRef.current) return;
      
      if (!mapRef.current) {
        mapRef.current = L.map(containerRef.current, {
          zoomControl: true,
          attributionControl: true,
        }).setView([37.553, 126.99], 11);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 18,
          opacity: 0.55,
        }).addTo(mapRef.current);
      }
      
      const map = mapRef.current;
      
      Object.values(layersRef.current).forEach(l => map.removeLayer(l));
      layersRef.current = {};
      
      // 자치구 평균 choropleth (해당 모드일 때)
      const isChoropleth = layer === 'gu-mini' || layer === 'gu-one';
      const useChoroSide = layer === 'gu-mini' ? 'mini' : 'one';
      const vk = useChoroSide === 'mini' ? 'ma' : 'oa';
      const nk = useChoroSide === 'mini' ? 'mn' : 'on';
      const ramp = useChoroSide === 'mini' ? RAMP_M : RAMP_O;
      const isPointMode = !isChoropleth;
      
      // 점 전용 pane (자치구 polygon 위에 떠 있도록)
      if (!map.getPane('pointPane')) {
        map.createPane('pointPane');
        map.getPane('pointPane').style.zIndex = 650;
      }
      // 툴팁이 항상 점 위에 뜨도록 강제 (기본 650 → 800)
      const tooltipPane = map.getPane('tooltipPane');
      if (tooltipPane) tooltipPane.style.zIndex = 800;
      
      let chMn=0, chMx=100;
      if (isChoropleth) {
        const vals = SEOUL_GEO.features.map(f => GU[GU.findIndex(g => g.n === f.properties.name)]?.[vk]).filter(v => v != null);
        chMn = Math.min(...vals);
        chMx = Math.max(...vals);
      }
      
      const guLayer = L.geoJSON(SEOUL_GEO, {
        interactive: isChoropleth,
        style: (feature) => {
          const guName = feature.properties.name;
          const guInfo = GU.find(g => g.n === guName);
          
          if (isChoropleth && guInfo) {
            return {
              fillColor: colorFor(guInfo[vk], ramp, chMn, chMx),
              weight: 1,
              opacity: 1,
              color: 'white',
              fillOpacity: 0.7,
            };
          }
          return {
            fillColor: '#a3a3a3',
            weight: 1,
            opacity: 0.4,
            color: '#737373',
            fillOpacity: 0.03,
          };
        },
        onEachFeature: (feature, layerEl) => {
          if (!isChoropleth) return;
          const guName = feature.properties.name;
          const guInfo = GU.find(g => g.n === guName);
          if (!guInfo) return;
          layerEl.bindTooltip(`
            <div style="font-family: -apple-system, sans-serif; font-size: 12px; line-height: 1.5;">
              <div style="font-weight: 600; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb;">${guName}</div>
              <div style="display: flex; justify-content: space-between; gap: 12px;"><span style="color: #6b7280">미니</span><span style="color: #4f4fbb"><b>${guInfo.ma ?? '—'}만</b> <span style="color:#9ca3af">n=${guInfo.mn}</span></span></div>
              <div style="display: flex; justify-content: space-between; gap: 12px;"><span style="color: #6b7280">원룸</span><span style="color: #a83d22"><b>${guInfo.oa ?? '—'}만</b> <span style="color:#9ca3af">n=${guInfo.on}</span></span></div>
            </div>
          `, { sticky: true });
          layerEl.on('mouseover', e => {
            e.target.setStyle({ weight: 2.5, color: '#1f2937', fillOpacity: 0.85 });
          });
          layerEl.on('mouseout', e => guLayer.resetStyle(e.target));
        },
      }).addTo(map);
      layersRef.current.gu = guLayer;
      
      // 매물 점 layer
      const showMiniPoints = layer === 'mini-points';
      const showOnePoints = layer === 'one-points';
      const showDongMini = layer === 'dong-mini';
      const showDongOne = layer === 'dong-one';
      
      if (showMiniPoints || showOnePoints) {
        const data = showMiniPoints ? MINI : ONE;
        const fillColor = showMiniPoints ? '#7676eb' : '#d6553a';
        const min = showMiniPoints ? M_MIN : O_MIN;
        const max = showMiniPoints ? M_MAX : O_MAX;
        const points = L.layerGroup();
        const dataSorted = [...data].sort((a, b) => b[3] - a[3]);
        dataSorted.forEach(d => {
          const r = Math.max(3, 3 + (d[3] - min) / (max - min) * 7);
          const marker = L.circleMarker([d[7], d[8]], {
            pane: 'pointPane',
            radius: r, fillColor, color: 'white', weight: 1.2, fillOpacity: 0.85,
          });
          marker.bindTooltip(`
            <div style="font-family: -apple-system, sans-serif; font-size: 12px; line-height: 1.5;">
              <div style="font-weight: 600; margin-bottom: 4px;">${d[0]}</div>
              <div style="color: #6b7280; font-size: 11px; margin-bottom: 4px;">${d[1]}구 ${d[2]}동</div>
              <div>평균월세 <b>${d[3]}만</b> <span style="color:#9ca3af;font-size:10px">(${d[4]===d[5] ? d[5]+'만' : d[4]+'~'+d[5]+'만'})</span></div>
              <div>보증금 ${d[6] ? d[6] + '만' : '없음'}</div>
            </div>
          `, { sticky: true });
          points.addLayer(marker);
        });
        points.addTo(map);
        layersRef.current.points = points;
      }
      
      if (showDongMini || showDongOne) {
        const dvk = showDongMini ? 'ma' : 'oa';
        const dnk = showDongMini ? 'mn' : 'on';
        const dRamp = showDongMini ? RAMP_M : RAMP_O;
        const sigVals = DONGS.filter(d => d[dnk] >= 5).map(d => d[dvk]).filter(v => v != null);
        const dMn = sigVals.length ? Math.min(...sigVals) : 20;
        const dMx = sigVals.length ? Math.max(...sigVals) : 80;
        const points = L.layerGroup();
        DONGS.filter(d => d[dvk] != null).slice().sort((a, b) => a[dnk] - b[dnk]).forEach(d => {
          const r = Math.max(5, 5 + Math.sqrt(d[dnk]) * 2.2);
          const marker = L.circleMarker([d.la, d.lg], {
            pane: 'pointPane',
            radius: r,
            fillColor: colorFor(d[dvk], dRamp, dMn, dMx),
            color: '#1f2937', weight: 1.2, fillOpacity: d[dnk] < 5 ? 0.65 : 0.95,
          });
          marker.bindTooltip(`
            <div style="font-family: -apple-system, sans-serif; font-size: 12px; line-height: 1.5;">
              <div style="font-weight: 600; margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb;">${d.g}구 ${d.d}동</div>
              <div style="display: flex; justify-content: space-between; gap: 12px;"><span style="color: #6b7280">미니</span><span style="color: #4f4fbb"><b>${d.ma ?? '—'}만</b> <span style="color:#9ca3af">n=${d.mn}</span></span></div>
              <div style="display: flex; justify-content: space-between; gap: 12px;"><span style="color: #6b7280">원룸</span><span style="color: #a83d22"><b>${d.oa ?? '—'}만</b> <span style="color:#9ca3af">n=${d.on}</span></span></div>
            </div>
          `, { sticky: true });
          points.addLayer(marker);
        });
        points.addTo(map);
        layersRef.current.points = points;
      }
    });
    
    return () => { cancelled = true; };
  }, [layer]);
  
  React.useEffect(() => {
    return () => {
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
      }
    };
  }, []);
  
  return <div ref={containerRef} style={{ height: 600, width: '100%', borderRadius: 8, overflow: 'hidden', border: '0.5px solid #e5e7eb' }} />;
};

// ========== 가격 히스토그램 ==========
const PriceHistogram = ({ w = 700, h = 200 }) => {
  const miniMap = Object.fromEntries(ANALYTICS.hist_mini);
  const oneMap = Object.fromEntries(ANALYTICS.hist_one);
  const allBins = [...new Set([...ANALYTICS.hist_mini.map(d=>d[0]), ...ANALYTICS.hist_one.map(d=>d[0])])].sort((a,b)=>a-b);
  const maxCount = Math.max(...ANALYTICS.hist_mini.map(d=>d[1]), ...ANALYTICS.hist_one.map(d=>d[1]));
  const padding = 30;
  const chartW = w - padding * 2;
  const chartH = h - padding * 2;
  const barW = chartW / allBins.length;
  const [hover, setHover] = React.useState(null);
  
  return (
    <div className="relative">
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto text-gray-500 dark:text-gray-400">
        {[0, 0.25, 0.5, 0.75, 1].map(p => {
          const y = padding + chartH * (1-p);
          return <g key={p}>
            <line x1={padding} y1={y} x2={padding+chartW} y2={y} stroke="currentColor" opacity={0.25} strokeWidth={0.5} strokeDasharray={p===0?"":"2,2"} />
            <text x={padding-4} y={y+3} fontSize="9" fill="currentColor" textAnchor="end">{Math.round(maxCount*p)}</text>
          </g>;
        })}
        {allBins.map((bin, i) => {
          const cm = miniMap[bin] || 0;
          const co = oneMap[bin] || 0;
          const x = padding + i * barW;
          const isHover = hover && hover.bin === bin;
          return <g key={i}>
            {cm > 0 && (
              <rect x={x+1} y={padding+chartH-(cm/maxCount)*chartH} width={barW/2-1} height={(cm/maxCount)*chartH} 
                    fill="#7676eb" opacity={isHover && hover.type === 'mini' ? 1 : 0.75}
                    style={{cursor: 'pointer'}}
                    onMouseEnter={(e) => {
                      const rect = e.currentTarget.ownerSVGElement.getBoundingClientRect();
                      const cx = e.clientX - rect.left;
                      const cy = e.clientY - rect.top;
                      setHover({bin, type: 'mini', count: cm, x: (cx/rect.width)*w, y: (cy/rect.height)*h});
                    }}
                    onMouseLeave={() => setHover(null)} />
            )}
            {co > 0 && (
              <rect x={x+barW/2} y={padding+chartH-(co/maxCount)*chartH} width={barW/2-1} height={(co/maxCount)*chartH} 
                    fill="#d6553a" opacity={isHover && hover.type === 'one' ? 1 : 0.75}
                    style={{cursor: 'pointer'}}
                    onMouseEnter={(e) => {
                      const rect = e.currentTarget.ownerSVGElement.getBoundingClientRect();
                      const cx = e.clientX - rect.left;
                      const cy = e.clientY - rect.top;
                      setHover({bin, type: 'one', count: co, x: (cx/rect.width)*w, y: (cy/rect.height)*h});
                    }}
                    onMouseLeave={() => setHover(null)} />
            )}
          </g>;
        })}
        {allBins.filter(b => b % 10 === 0).map((bin) => {
          const i = allBins.indexOf(bin);
          return <text key={bin} x={padding+i*barW+barW/2} y={padding+chartH+12} fontSize="9" fill="currentColor" textAnchor="middle">{bin}</text>;
        })}
        <text x={padding+chartW+5} y={padding+chartH+12} fontSize="9" fill="currentColor">만원</text>
      </svg>
      {hover && (
        <div className="absolute pointer-events-none bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-md shadow-lg px-2.5 py-1.5 text-xs z-50"
             style={{
               left: `${(hover.x/w)*100}%`,
               top: `${(hover.y/h)*100}%`,
               transform: 'translate(-50%, -120%)',
               minWidth: '110px',
             }}>
          <div className="font-semibold mb-0.5" style={{color: hover.type === 'mini' ? '#7676eb' : '#d6553a'}}>
            {hover.type === 'mini' ? '미니룸' : '원룸'} {hover.bin}~{hover.bin+5}만원
          </div>
          <div className="tabular-nums text-gray-700 dark:text-gray-200">
            <b>{hover.count}건</b>
            <span className="text-gray-400 dark:text-gray-500 ml-1">
              ({(hover.count / (hover.type === 'mini' ? MINI.length : ONE.length) * 100).toFixed(1)}%)
            </span>
          </div>
        </div>
      )}
    </div>
  );
};

// ========== 가격 분위수 차트 ==========
const PriceQuartiles = () => {
  const m = ANALYTICS_V7.mini_q;
  const o = ANALYTICS_V7.one_q;
  
  const QuartileBar = ({ q, label, color, totalRange }) => {
    if (!q.p10) return null;
    const min = totalRange[0], max = totalRange[1];
    const xpct = (v) => ((v - min) / (max - min)) * 100;
    return (
      <div>
        <div className="text-[10px] font-medium mb-1" style={{color}}>{label}</div>
        <div className="relative h-8 bg-gray-100 dark:bg-gray-700 rounded">
          {/* whisker */}
          <div className="absolute top-1/2 h-px" 
               style={{left:`${xpct(q.p10)}%`, width:`${xpct(q.p90)-xpct(q.p10)}%`, background: color, opacity: 0.4, transform:'translateY(-50%)'}}></div>
          {/* p10/p90 ticks */}
          <div className="absolute" style={{left:`${xpct(q.p10)}%`, top:'25%', bottom:'25%', width:'1px', background:color, opacity:0.6}}></div>
          <div className="absolute" style={{left:`${xpct(q.p90)}%`, top:'25%', bottom:'25%', width:'1px', background:color, opacity:0.6}}></div>
          {/* IQR box */}
          <div className="absolute top-1 bottom-1 rounded" 
               style={{left:`${xpct(q.p25)}%`, width:`${xpct(q.p75)-xpct(q.p25)}%`, background: color, opacity: 0.5}}></div>
          {/* median */}
          <div className="absolute top-0 bottom-0" 
               style={{left:`${xpct(q.p50)}%`, width:'2px', background: color}}></div>
        </div>
        <div className="grid grid-cols-5 gap-1 text-[9px] text-gray-500 dark:text-gray-400 tabular-nums mt-1" style={{fontFamily:'monospace'}}>
          <span>P10 {q.p10}</span><span className="text-center">P25 {q.p25}</span><span className="text-center font-bold" style={{color}}>중앙 {q.p50}</span><span className="text-center">P75 {q.p75}</span><span className="text-right">P90 {q.p90}</span>
        </div>
      </div>
    );
  };
  
  // 미니/원룸 공통 X축 범위 (0~120만)
  const range = [10, 120];
  const ticks = [20, 40, 60, 80, 100];
  
  return (
    <div className="bg-white dark:bg-gray-800 rounded p-3 border border-gray-100 dark:border-gray-700 dark:border-gray-700">
      <div className="text-xs font-semibold mb-1">📈 가격 분위수 (Box Plot)</div>
      <div className="text-[10px] text-gray-500 dark:text-gray-400 mb-3">평균은 이상치에 흔들림 — 중앙값·분위수가 진짜 시장 위치</div>
      <div className="space-y-3">
        <QuartileBar q={m} label={`미니룸 (n=${MINI.length})`} color="#7676eb" totalRange={range} />
        <QuartileBar q={o} label={`원룸 (n=${ONE.length})`} color="#d6553a" totalRange={range} />
      </div>
      <div className="relative mt-2">
        <div className="grid text-[9px] text-gray-400 dark:text-gray-500 tabular-nums" style={{gridTemplateColumns: `repeat(${ticks.length}, 1fr)`}}>
          {ticks.map(t => (
            <div key={t} className="text-center" style={{
              position: 'absolute',
              left: `${((t-range[0])/(range[1]-range[0]))*100}%`,
              transform: 'translateX(-50%)'
            }}>{t}만</div>
          ))}
        </div>
        <div className="h-3"></div>
      </div>
      <div className="text-[9px] text-gray-400 dark:text-gray-500 mt-2 pt-2 border-t border-gray-100 dark:border-gray-700">
        🟦 박스 = IQR (P25~P75, 중간 50%) · 짙은 선 = 중앙값 · 가는 선 = P10~P90 분포
      </div>
    </div>
  );
};

// ========== 자치구 시장 갭 산점도 ==========
const MarketScatter = () => {
  const data = ANALYTICS_V7.market.filter(d => d.oa != null && d.on >= 5);
  const W = 700, H = 320, padL = 50, padR = 30, padT = 20, padB = 50;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const [hover, setHover] = React.useState(null);
  
  const xMax = Math.max(...data.map(d => d.on));
  const yMin = Math.min(...data.map(d => d.oa));
  const yMax = Math.max(...data.map(d => d.oa));
  const yPad = (yMax - yMin) * 0.1;
  
  const xScale = (v) => padL + (v / xMax) * chartW;
  const yScale = (v) => padT + chartH - ((v - yMin + yPad) / (yMax - yMin + yPad*2)) * chartH;
  
  // 평균선
  const avgY = data.reduce((s,d) => s + d.oa, 0) / data.length;
  const avgX = data.reduce((s,d) => s + d.on, 0) / data.length;
  
  // 4사분면 분류 라벨
  const quadrant = (d) => {
    const isHigh = d.oa > avgY, isLarge = d.on > avgX;
    if (isLarge && isHigh) return {label: '큰시장+고가 (진입장벽)', color: '#dc2626'};
    if (isLarge && !isHigh) return {label: '큰시장+저가 (박리다매)', color: '#0891b2'};
    if (!isLarge && isHigh) return {label: '작은시장+고가 (니치)', color: '#7c3aed'};
    return {label: '작은시장+저가', color: '#94a3b8'};
  };
  
  return (
    <div className="bg-white dark:bg-gray-800 rounded p-3 border border-gray-100 dark:border-gray-700 relative">
      <div className="text-xs font-semibold mb-1">🗺️ 자치구별 시장 크기 vs 가격 (원룸 기준)</div>
      <div className="text-[10px] text-gray-500 dark:text-gray-400 mb-2">
        오른쪽=매물 많음(시장 큼), 위쪽=가격 높음 · 우측 상단(빨강): 큰 시장+고가 · 우측 하단: 큰 시장+저가(박리다매)
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto text-gray-600 dark:text-gray-400">
        {/* 평균선 */}
        <line x1={padL} x2={padL+chartW} y1={yScale(avgY)} y2={yScale(avgY)} stroke="currentColor" strokeOpacity={0.3} strokeWidth="0.5" strokeDasharray="3,3" />
        <line x1={xScale(avgX)} x2={xScale(avgX)} y1={padT} y2={padT+chartH} stroke="currentColor" strokeOpacity={0.3} strokeWidth="0.5" strokeDasharray="3,3" />
        <text x={padL+chartW-4} y={yScale(avgY)-3} fontSize="8" fill="currentColor" textAnchor="end">평균 {avgY.toFixed(0)}만</text>

const SortableTable = ({ data, columns, defaultSort, title, subtitle, search = false, minN = false }) => {
  const [sortKey, setSortKey] = React.useState(defaultSort);
  const [sortDir, setSortDir] = React.useState('desc');
  const [q, setQ] = React.useState('');
  const [minNum, setMinNum] = React.useState(3);
  
  const sorted = React.useMemo(() => {
    let arr = [...data];
    if (minN) arr = arr.filter(d => (d.mn + d.on) >= minNum);
    if (q) {
      const ql = q.toLowerCase();
      arr = arr.filter(d => Object.values(d).some(v => String(v).toLowerCase().includes(ql)));
    }
    arr.sort((a, b) => {
      const col = columns.find(c => c.k === sortKey);
      let av = col?.sort ? col.sort(a) : a[sortKey];
      let bv = col?.sort ? col.sort(b) : b[sortKey];
      if (av == null) av = -1;
      if (bv == null) bv = -1;
      if (typeof av === 'string') return sortDir === 'desc' ? bv.localeCompare(av) : av.localeCompare(bv);
      return sortDir === 'desc' ? bv - av : av - bv;
    });
    return arr;
  }, [sortKey, sortDir, q, minNum]);
  
  const handleSort = (k) => {
    if (sortKey === k) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(k); setSortDir('desc'); }
  };
  
  return (
    <div className="bg-white dark:bg-gray-800 rounded border border-gray-100 dark:border-gray-700 dark:border-gray-700">
      <div className="px-3 py-2 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between gap-2 flex-wrap">
        <div>
          <span className="text-sm font-semibold">{title}</span>
          <span className="text-xs text-gray-500 dark:text-gray-400 ml-2">{subtitle ?? `${sorted.length}개`}</span>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {search && <input value={q} onChange={e => setQ(e.target.value)} placeholder="검색…" className="px-2 py-1 text-xs border border-gray-200 dark:border-gray-700 rounded w-28 outline-none focus:border-gray-400" />}
          {minN && <div className="flex gap-1"><span className="text-[10px] text-gray-500 dark:text-gray-400 self-center">최소:</span>{[3,5,10].map(n => <button key={n} onClick={() => setMinNum(n)} className={`px-1.5 py-0.5 text-[10px] rounded border ${minNum===n?'border-gray-900 font-medium':'border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 '}`}>{n}+</button>)}</div>}
        </div>
      </div>
      <div className="grid max-h-80 overflow-y-auto text-xs" style={{gridTemplateColumns: columns.map(c=>c.w).join(' ')}}>
        {columns.map(c => (
          <div key={c.k} onClick={() => handleSort(c.k)} className={`text-[10px] uppercase tracking-wide py-1.5 px-2 border-b border-gray-200 dark:border-gray-700 sticky top-0 bg-white dark:bg-gray-800 cursor-pointer ${sortKey===c.k?'text-gray-900 dark:text-gray-100 font-medium':'text-gray-400 dark:text-gray-500'}`} style={{textAlign:c.align||'left'}}>
            {c.label} {sortKey===c.k && (sortDir==='desc'?'↓':'↑')}
          </div>
        ))}
        {sorted.map((d, i) => (
          <div key={i} className="contents">
            {columns.map(c => (
              <div key={c.k} className="py-1 px-2 border-b border-gray-100 dark:border-gray-700 tabular-nums" style={{textAlign:c.align||'left',color:c.color||''}}>
                {c.render ? c.render(d) : d[c.k]}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
};

const WalkPremiumChart = ({ side = 'one' }) => {
  const data = React.useMemo(() => {
    const arr = [];
    for (const [gu, cats] of Object.entries(WALK_MATRIX)) {
      const c = cats[side];
      if (!c || c.prem_pct == null) continue;
      const totalN = c['1-2'].n + c['3-5'].n + c['6-10'].n;
      if (totalN < 8) continue;
      arr.push({
        gu, totalN,
        avg12: c['1-2'].avg, n12: c['1-2'].n,
        avg610: c['6-10'].avg, n610: c['6-10'].n,
        prem_man: c.prem_man,
        prem_pct: c.prem_pct,
      });
    }
    arr.sort((a, b) => b.prem_pct - a.prem_pct);
    return arr;
  }, [side]);
  
  const maxAbs = Math.max(...data.map(d => Math.abs(d.prem_pct)));
  const baseColor = side === 'mini' ? '#7676eb' : '#d6553a';
  
  return (
    <div className="space-y-1.5">
      {data.map(d => {

            <div className="relative h-5">
              {/* 0 baseline */}
              <div className="absolute top-0 bottom-0" style={{left: '50%', width: '1px', background: '#d1d5db'}}></div>
              {pos ? (
                <div className="absolute top-1 bottom-1 rounded-sm flex items-center justify-end pr-1 text-white text-[9px] font-bold tabular-nums"
                     style={{
                       left: '50%',
                       width: `${(d.prem_pct/maxAbs)*48}%`,
                       background: baseColor,
                       opacity: 0.85,
                     }}>
                  {d.prem_pct >= 5 ? `+${d.prem_pct.toFixed(0)}%` : ''}
                </div>
              ) : (
                <div className="absolute top-1 bottom-1 rounded-sm flex items-center justify-start pl-1 text-white text-[9px] font-bold tabular-nums"

                       width: `${(Math.abs(d.prem_pct)/maxAbs)*48}%`,

            <div className="text-left tabular-nums text-gray-500 dark:text-gray-400 text-[10px]">

        <div className="text-[10px] text-gray-400 dark:text-gray-500 uppercase tracking-wide pb-1 border-b border-gray-200 dark:border-gray-700 text-right">6~10분</div>

        {data.map(d => (

// ========== 메인 대시보드 ==========
function Dashboard() {
  const [darkMode, setDarkMode] = React.useState(() => {
    if (typeof window === 'undefined') return false;
    try {
      const saved = window.localStorage.getItem('seoul-dash-dark');
      if (saved !== null) return saved === '1';
    } catch(e) {}
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  
  React.useEffect(() => {
    if (typeof document === 'undefined') return;
    if (darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    try { window.localStorage.setItem('seoul-dash-dark', darkMode ? '1' : '0'); } catch(e) {}
  }, [darkMode]);
  
  const [mapLayer, setMapLayer] = React.useState('mini-points');
  
  const layerOptions = [
    { id: 'mini-points', label: '미니룸 매물', color: '#7676eb', desc: `n=${MINI.length}` },
    { id: 'one-points', label: '원룸 매물', color: '#d6553a', desc: `n=${ONE.length}` },
    { id: 'gu-mini', label: '자치구 평균(미니)', color: '#7676eb', desc: 'choropleth' },
    { id: 'gu-one', label: '자치구 평균(원룸)', color: '#d6553a', desc: 'choropleth' },
